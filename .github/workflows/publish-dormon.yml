name: Publish @dormon packages

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: yarn

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Bump versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Bump version in all package.json files
          for pkg in mcp-provider-api mcp-provider-dx-core mcp; do
            node -e "
              const pkg = require('./packages/$pkg/package.json');
              pkg.version = '$VERSION';
              require('fs').writeFileSync('./packages/$pkg/package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
          done

          # Update internal dependency versions
          node -e "
            const pkg = require('./packages/mcp-provider-dx-core/package.json');
            pkg.dependencies['@dormon/mcp-provider-api'] = '$VERSION';
            require('fs').writeFileSync('./packages/mcp-provider-dx-core/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          node -e "
            const pkg = require('./packages/mcp/package.json');
            pkg.dependencies['@dormon/mcp-provider-api'] = '$VERSION';
            pkg.dependencies['@dormon/mcp-provider-dx-core'] = '$VERSION';
            require('fs').writeFileSync('./packages/mcp/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build all packages
        run: |
          cd packages/mcp-provider-api && npx tsc -p tsconfig.publish.json && cd ../..
          cd packages/mcp-provider-dx-core && npx tsc -p tsconfig.publish.json && cd ../..
          cd packages/mcp && npx tsc -p tsconfig.publish.json && cd ../..

      - name: Publish @dormon/mcp-provider-api
        run: cd packages/mcp-provider-api && npm publish --access public

      - name: Publish @dormon/mcp-provider-dx-core
        run: cd packages/mcp-provider-dx-core && npm publish --access public

      - name: Publish @dormon/salesforce-mcp
        run: cd packages/mcp && npm publish --access public

      - name: Commit version bump back to main
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore: bump all @dormon packages to v${VERSION}" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Verify published packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Waiting for npm registry to update..."
          sleep 10
          npm view "@dormon/salesforce-mcp@${VERSION}" version || echo "⚠️ Not yet visible (may take a few minutes)"

      - name: Create GitHub Release
        uses: ncipollo/release-action@2c591bcc8ecdcd2db72b97d6147f871fcd833ba5
        with:
          tag: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## @dormon/salesforce-mcp v${{ steps.version.outputs.version }}

            ```bash
            npx @dormon/salesforce-mcp@${{ steps.version.outputs.version }} --help
            ```
          token: ${{ secrets.GITHUB_TOKEN }}
          skipIfReleaseExists: true

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## Published Packages v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| @dormon/mcp-provider-api | ${VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| @dormon/mcp-provider-dx-core | ${VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| @dormon/salesforce-mcp | ${VERSION} |" >> $GITHUB_STEP_SUMMARY
